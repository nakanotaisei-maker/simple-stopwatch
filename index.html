<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ストップウォッチ</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1 class="title">ストップウォッチ</h1>

    <div class="display">
      <span id="minutes">00</span>
      <span class="colon">:</span>
      <span id="seconds">00</span>
      <span class="dot">.</span>
      <span id="centiseconds">00</span>
    </div>

    <div class="controls">
      <button id="start-btn" class="btn btn-start">スタート</button>
      <button id="lap-btn" class="btn btn-lap" disabled>ラップ</button>
      <button id="reset-btn" class="btn btn-reset" disabled>リセット</button>
    </div>

    <div class="lap-section" id="lap-section">
      <div class="lap-header" id="lap-header"></div>
      <ul class="lap-list" id="lap-list"></ul>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
